<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <style>

.error-message {
    color: red;
    font-weight: normal;
}

</style>
</head>
<body>

<form method="POST">
    {% csrf_token %}
<h2 id="expense_heading">Add Expense for
    {{today|date:"j F Y"}}
    ({{today|date:"l"}})
</h2>
 {% if error %}
    <p class="error-message">
        {{error}}
    </p>
    {% endif %}
<details>
    <summary>Select Another Date</summary>
    <input
        type="date"
        name="expense_date"
        value="{{ today|date:'Y-m-d' }}"
        id="expense_date"
    >
</details>
<br>
<script>
    const dateInput=document.getElementById('expense_date')
    const heading=document.getElementById('expense_heading')

    dateInput.addEventListener("change",function()
{
    const selectedDate=new Date(this.value)
    const formattedDate=selectedDate.toLocaleDateString(
        "en-GB",
        {
            day:"numeric",
            month:"long",
            year:"numeric"
        }
    );
    const day=selectedDate.toLocaleDateString(
        "en-GB",
        {
            weekday:"long"
        }
    );
    heading.textContent=
        `Add Expense for ${formattedDate} (${day})` ;
}
);

</script>

<table id="expenseTable" border="1">

    <tr>
        <th>Category</th>
        <th>Description</th>
         <th> Amount </th>
    </tr>

    {% if old_expenses %}

{% for expense in old_expenses %}

<tr>

<td>
<select name="category[]" required>

<option value="Food"
{% if expense.category == "Food" %}selected{% endif %}>
Food
</option>

<option value="Travel"
{% if expense.category == "Travel" %}selected{% endif %}>
Travel
</option>

<option value="Shopping"
{% if expense.category == "Shopping" %}selected{% endif %}>
Shopping
</option>

<option value="Health"
{% if expense.category == "Health" %}selected{% endif %}>
Health
</option>

<option value="Other"
{% if expense.category == "Other" %}selected{% endif %}>
Other
</option>

</select>
</td>


<td>

<input 
type="text"
name="description[]"
value="{{ expense.description }}"
>

</td>


<td>

<input 
type="number"
name="amount[]"
min="1"
value="{{ expense.amount }}"
required
>

</td>


</tr>

{% endfor %}


{% else %}

<tr>

<td>
<select name="category[]" required>

<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Health">Health</option>
<option value="Other">Other</option>

</select>
</td>


<td>
<input type="text" name="description[]">
</td>


<td>
<input 
type="number"
name="amount[]"
min="1"
required>
</td>


</tr>

{% endif %}
    <br>
    <buttion type="button" onclick="addRow()">
        + Add Another Expense
    </buttion>

    <br><br>
    <button type="submit">Save All Expenses</button>
</table>

<script>
function addRow(){
    const table=document.getElementById("expenseTable")
    const row=table.insertRow();
    row.innerHTML=`

    <td>
    <select name="category[]">
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Health">Health</option>
        <option value="Other">Other</option>
    </select>
</td>
     <td>
    <input type="text" name="description[]">
    </td>

     <td>
    <input type="number" name="amount[]">
    </td>
    `;
}
</script>
</form>

</body>
</html>
